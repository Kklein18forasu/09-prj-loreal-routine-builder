<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>L'Oréal | Smart Routine Advisor</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet"/>

  <style>
    body {
      font-family: "Montserrat", sans-serif;
      background: #fff;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
    }

    select, input {
      padding: 10px;
      margin: 10px 5px;
      width: 48%;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 20px 0;
    }

    .product {
      border: 1px solid #ccc;
      padding: 10px;
      cursor: pointer;
    }

    .selected {
      border: 2px solid red;
    }

    button {
      padding: 12px;
      width: 100%;
      background: red;
      color: white;
      border: none;
      cursor: pointer;
    }

    .chat {
      margin-top: 20px;
      border: 1px solid #ccc;
      padding: 10px;
      height: 200px;
      overflow-y: auto;
    }

    .msg {
      margin: 5px 0;
    }
  </style>
</head>

<body>

<h1>L'Oréal Routine Builder</h1>

<select id="category">
  <option value="">All</option>
  <option value="cleanser">Cleanser</option>
  <option value="moisturizer">Moisturizer</option>
  <option value="skincare">Skincare</option>
  <option value="haircare">Haircare</option>
  <option value="makeup">Makeup</option>
</select>

<input id="search" placeholder="Search products..." />

<div id="products" class="products"></div>

<h3>Selected Products</h3>
<div id="selected"></div>

<button id="generate">Generate Routine</button>

<div class="chat" id="chat"></div>

<input id="chatInput" placeholder="Ask follow up..." />
<button id="send">Send</button>

<script>
const WORKER_URL = "https://wispy-feather-ddc6.kklein18.workers.dev";

let products = [];
let selected = [];
let history = [];

const productsDiv = document.getElementById("products");
const selectedDiv = document.getElementById("selected");
const chat = document.getElementById("chat");

/* LOAD PRODUCTS */
async function load() {
  const res = await fetch("products.json");
  const data = await res.json();
  products = data.products;
  render();
}

/* RENDER PRODUCTS */
function render() {
  const category = document.getElementById("category").value;
  const search = document.getElementById("search").value.toLowerCase();

  let list = products;

  if (category) {
    list = list.filter(p => p.category === category);
  }

  if (search) {
    list = list.filter(p =>
      p.name.toLowerCase().includes(search) ||
      p.brand.toLowerCase().includes(search)
    );
  }

  productsDiv.innerHTML = list.map(p => `
    <div class="product ${selected.includes(p.id) ? "selected" : ""}" data-id="${p.id}">
      <img src="${p.image}" width="100"/>
      <h4>${p.name}</h4>
      <p>${p.brand}</p>
    </div>
  `).join("");

  document.querySelectorAll(".product").forEach(el => {
    el.onclick = () => {
      const id = Number(el.dataset.id);
      if (selected.includes(id)) {
        selected = selected.filter(i => i !== id);
      } else {
        selected.push(id);
      }
      render();
      renderSelected();
    };
  });
}

/* RENDER SELECTED */
function renderSelected() {
  selectedDiv.innerHTML = products
    .filter(p => selected.includes(p.id))
    .map(p => `<div>${p.name}</div>`)
    .join("");
}

/* CHAT MESSAGE */
function msg(role, text) {
  chat.innerHTML += `<div class="msg"><b>${role}:</b> ${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

/* CALL WORKER */
async function callAI(messages, selectedProducts) {
  const res = await fetch(WORKER_URL, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({messages, selectedProducts})
  });

  const data = await res.json();

  if (!res.ok) throw new Error(data.error || "error");

  return data.reply;
}

/* GENERATE ROUTINE */
document.getElementById("generate").onclick = async () => {
  if (!selected.length) {
    msg("bot", "Select products first");
    return;
  }

  const selectedProducts = products.filter(p => selected.includes(p.id));

  msg("you", "Generate my routine");

  try {
    const reply = await callAI(
      [{role:"user", content:"Generate routine"}],
      selectedProducts
    );
    msg("bot", reply);
  } catch (e) {
    msg("bot", e.message);
  }
};

/* CHAT */
document.getElementById("send").onclick = async () => {
  const input = document.getElementById("chatInput");
  const text = input.value;
  if (!text) return;

  msg("you", text);
  input.value = "";

  try {
    const reply = await callAI([{role:"user", content:text}], []);
    msg("bot", reply);
  } catch (e) {
    msg("bot", e.message);
  }
};

/* EVENTS */
document.getElementById("category").onchange = render;
document.getElementById("search").oninput = render;

load();
</script>

</body>
</html>
